<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akun Terkunci — FASOP UP2B</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --blue:   #2563eb;
            --red:    #ef4444;
            --bg:     #060d1a;
            --surface:#0d1b2e;
            --border: rgba(255,255,255,0.07);
        }
        body {
            font-family: 'Barlow', sans-serif;
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        .icon-wrap {
            width: 72px; height: 72px;
            background: rgba(239,68,68,.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
        }
        .icon-wrap i { font-size: 32px; color: var(--red); }
        h1 {
            font-size: 22px; font-weight: 800;
            color: #fff; margin-bottom: 12px;
        }
        p {
            font-size: 14px; color: #7a93b4;
            line-height: 1.7; margin-bottom: 8px;
        }
        .badge-limit {
            display: inline-block;
            background: rgba(239,68,68,.15);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,.3);
            border-radius: 20px;
            font-size: 13px; font-weight: 700;
            padding: 4px 16px; margin: 16px 0 24px;
        }
        .contact-box {
            background: rgba(37,99,235,.1);
            border: 1px solid rgba(37,99,235,.25);
            border-radius: 10px;
            padding: 16px;
            font-size: 13px; color: #93c5fd;
            line-height: 1.6;
        }
        .contact-box strong { color: #fff; display: block; margin-bottom: 4px; }
        a { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon-wrap">
        <i class="bi bi-shield-lock-fill"></i>
    </div>
    <h1>Akun Terkunci</h1>
    <p>Terlalu banyak percobaan login yang gagal.</p>
    <div class="badge-limit">
        <i class="bi bi-exclamation-triangle me-1"></i>
        5 percobaan gagal berturut-turut
    </div>
    <p>Akun Anda telah dikunci secara otomatis untuk keamanan sistem.</p>
    <div class="contact-box">
        <strong>Hubungi Administrator</strong>
        Sampaikan username Anda kepada admin FASOP untuk membuka kunci akun.
    </div>
</div>
</body>
</html>
