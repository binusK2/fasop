<!-- DEVICE INFO BANNER — include dengan: banner_icon, banner_icon_color, banner_icon_bg -->
<div class="card mb-3" style="background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);border:none;">
    <div class="card-body py-3 px-4">
        <div class="d-flex align-items-center gap-4 flex-wrap">
            <div style="width:38px;height:38px;background:{{ banner_icon_bg|default:'rgba(59,130,246,0.2)' }};border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="bi {{ banner_icon|default:'bi-hdd-network' }}" style="font-size:18px;color:{{ banner_icon_color|default:'#93c5fd' }};"></i>
            </div>
            <div>
                <div style="font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Perangkat</div>
                <div style="font-size:15px;font-weight:700;color:#f1f5f9;">{{ device.nama }}</div>
            </div>
            <div class="vr" style="background:rgba(255,255,255,0.1);width:1px;align-self:stretch;"></div>
            <div><div style="font-size:10px;color:#94a3b8;font-weight:600;text-transform:uppercase;">Jenis</div><div style="font-size:12px;color:#cbd5e1;">{{ device.jenis|default:"—" }}</div></div>
            <div><div style="font-size:10px;color:#94a3b8;font-weight:600;text-transform:uppercase;">IP</div><div style="font-size:12px;color:#7dd3fc;font-family:monospace;">{{ device.ip_address|default:"—" }}</div></div>
            <div><div style="font-size:10px;color:#94a3b8;font-weight:600;text-transform:uppercase;">Lokasi</div><div style="font-size:12px;color:#cbd5e1;">{{ device.lokasi|default:"—" }}</div></div>
            {% if device.merk %}<div><div style="font-size:10px;color:#94a3b8;font-weight:600;text-transform:uppercase;">Merk</div><div style="font-size:12px;color:#cbd5e1;">{{ device.merk }}</div></div>{% endif %}
            {% if device.type %}<div><div style="font-size:10px;color:#94a3b8;font-weight:600;text-transform:uppercase;">Tipe</div><div style="font-size:12px;color:#cbd5e1;">{{ device.type }}</div></div>{% endif %}
        </div>
    </div>
</div>
