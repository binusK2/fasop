{% extends 'base.html' %}
{% block title %}Wiring — {{ device.nama }}{% endblock %}
{% block page_title %}Wiring Diagram{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-2 mb-3 no-print">
  <a href="{% url 'device_view' device.pk %}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Kembali
  </a>
  <span class="text-muted" style="font-size:13px;">{{ device.nama }}</span>
  <div class="ms-auto d-flex gap-2">
    <button id="btn-undo" class="btn btn-sm btn-outline-secondary" title="Undo"><i class="bi bi-arrow-counterclockwise"></i></button>
    <button id="btn-redo" class="btn btn-sm btn-outline-secondary" title="Redo"><i class="bi bi-arrow-clockwise"></i></button>
    <button id="btn-clear" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash me-1"></i>Clear</button>
    <button id="btn-save" class="btn btn-sm btn-primary"><i class="bi bi-floppy me-1"></i>Simpan</button>
  </div>
</div>

<style>
#wiring-wrap { display:flex; gap:0; border:1px solid #e2e8f0; border-radius:10px; overflow:hidden; background:#fff; }
#palette {
  width:130px; flex-shrink:0; background:#f8fafc; border-right:1px solid #e2e8f0;
  padding:10px 8px; display:flex; flex-direction:column; gap:6px;
}
#palette .pal-title { font-size:10px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:.5px; margin:4px 0 2px; }
.pal-item {
  display:flex; align-items:center; gap:7px;
  padding:7px 8px; border-radius:8px; cursor:pointer;
  font-size:12px; font-weight:600; color:#475569;
  border:1px solid #e2e8f0; background:#fff;
  transition: background .15s, border-color .15s;
  user-select:none;
}
.pal-item:hover { background:#eff6ff; border-color:#bfdbfe; color:#1d4ed8; }
.pal-item.active { background:#dbeafe; border-color:#3b82f6; color:#1d4ed8; }
.pal-sep { border:none; border-top:1px solid #e2e8f0; margin:4px 0; }
#canvas-wrap { flex:1; position:relative; overflow:hidden; }
#konva-container { background:#fff; cursor:default; }
#canvas-wrap.wire-mode { cursor:crosshair; }
#toast { position:fixed; bottom:24px; right:24px; background:#1e293b; color:#fff; padding:10px 18px; border-radius:8px; font-size:13px; display:none; z-index:9999; }
</style>

<div id="wiring-wrap">
  <!-- Palette -->
  <div id="palette">
    <div class="pal-title">Komponen</div>
    <div class="pal-item" data-type="device">
      <svg width="18" height="18" viewBox="0 0 18 18"><rect x="1" y="3" width="16" height="12" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.8"/><line x1="5" y1="3" x2="5" y2="15" stroke="#3b82f6" stroke-width="1"/></svg>
      Perangkat
    </div>
    <div class="pal-item" data-type="psu">
      <svg width="18" height="18" viewBox="0 0 18 18"><rect x="2" y="4" width="14" height="10" rx="2" fill="none" stroke="#f59e0b" stroke-width="1.8"/><text x="9" y="12" text-anchor="middle" font-size="7" font-weight="bold" fill="#f59e0b">PSU</text></svg>
      Power Supply
    </div>
    <div class="pal-item" data-type="ac">
      <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="7" fill="none" stroke="#ef4444" stroke-width="1.8"/><path d="M5 9 Q7 5 9 9 Q11 13 13 9" fill="none" stroke="#ef4444" stroke-width="1.5"/></svg>
      Sumber AC
    </div>
    <div class="pal-item" data-type="dc">
      <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="7" fill="none" stroke="#8b5cf6" stroke-width="1.8"/><line x1="5" y1="7" x2="13" y2="7" stroke="#8b5cf6" stroke-width="2"/><line x1="7" y1="11" x2="11" y2="11" stroke="#8b5cf6" stroke-width="1.5"/></svg>
      Sumber DC
    </div>
    <div class="pal-item" data-type="ground">
      <svg width="18" height="18" viewBox="0 0 18 18"><line x1="9" y1="2" x2="9" y2="10" stroke="#10b981" stroke-width="1.8"/><line x1="4" y1="10" x2="14" y2="10" stroke="#10b981" stroke-width="1.8"/><line x1="6" y1="13" x2="12" y2="13" stroke="#10b981" stroke-width="1.5"/><line x1="8" y1="16" x2="10" y2="16" stroke="#10b981" stroke-width="1.2"/></svg>
      Grounding
    </div>
    <div class="pal-item" data-type="terminal">
      <svg width="18" height="18" viewBox="0 0 18 18"><rect x="3" y="6" width="12" height="7" rx="1" fill="none" stroke="#64748b" stroke-width="1.8"/><circle cx="7" cy="9.5" r="1.5" fill="#64748b"/><circle cx="11" cy="9.5" r="1.5" fill="#64748b"/></svg>
      Terminal
    </div>
    <hr class="pal-sep">
    <div class="pal-title">Aksi</div>
    <div class="pal-item" id="tool-wire" data-type="wire">
      <svg width="18" height="18" viewBox="0 0 18 18"><line x1="2" y1="16" x2="16" y2="2" stroke="#1e293b" stroke-width="2"/><circle cx="2" cy="16" r="2" fill="#1e293b"/><circle cx="16" cy="2" r="2" fill="#1e293b"/></svg>
      Kabel
    </div>
    <div class="pal-item" id="tool-select" data-type="select">
      <i class="bi bi-cursor" style="font-size:15px;"></i>
      Pilih
    </div>
    <div class="pal-item" id="tool-delete" data-type="delmode">
      <i class="bi bi-eraser" style="font-size:15px;color:#ef4444;"></i>
      <span style="color:#ef4444;">Hapus</span>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <div id="konva-container"></div>
  </div>
</div>
<div id="toast"></div>

<!-- Hidden: existing data -->
<script>
const EXISTING_JSON = {{ device.wiring_json|default:"null"|safe }};
const SAVE_URL      = "{% url 'device_wiring' device.pk %}";
const CSRF_TOKEN    = "{{ csrf_token }}";
</script>

<script src="https://unpkg.com/konva@9/konva.min.js"></script>
<script>
// ── Config ──────────────────────────────────────────────────────
const W = document.getElementById('canvas-wrap').offsetWidth || 900;
const H = 540;

const COLORS = {
  device:   { fill:'#eff6ff', stroke:'#3b82f6', text:'#1e40af' },
  psu:      { fill:'#fffbeb', stroke:'#f59e0b', text:'#92400e' },
  ac:       { fill:'#fff1f2', stroke:'#ef4444', text:'#991b1b' },
  dc:       { fill:'#f5f3ff', stroke:'#8b5cf6', text:'#5b21b6' },
  ground:   { fill:'#f0fdf4', stroke:'#10b981', text:'#065f46' },
  terminal: { fill:'#f8fafc', stroke:'#64748b', text:'#334155' },
};

const LABELS = {
  device:'Perangkat', psu:'Power Supply', ac:'Sumber AC', dc:'Sumber DC',
  ground:'Ground', terminal:'Terminal',
};

// ── Stage ────────────────────────────────────────────────────────
const stage = new Konva.Stage({ container:'konva-container', width:W, height:H });
const layer = new Konva.Layer();
const wireLayer = new Konva.Layer();
stage.add(wireLayer);
stage.add(layer);

// ── State ────────────────────────────────────────────────────────
let mode      = 'select';   // select | wire | delmode
let wireStart = null;       // { node, x, y }
let tempLine  = null;
let idCounter = Date.now();
const nodes   = {};   // id → Konva.Group
const wires   = {};   // id → { line, fromId, toId, label }
const history = [];
let histIdx   = -1;

// ── Helpers ──────────────────────────────────────────────────────
function uid() { return 'n' + (idCounter++); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(el._t); el._t = setTimeout(() => el.style.display='none', 2000);
}
function snapshot() {
  const s = JSON.stringify(serialize());
  history.splice(histIdx + 1);
  history.push(s);
  if (history.length > 60) history.shift();
  histIdx = history.length - 1;
}

// ── Draw symbol ──────────────────────────────────────────────────
function drawSymbol(type, x, y, label, id) {
  id = id || uid();
  const col = COLORS[type] || COLORS.device;
  const lbl = label || LABELS[type] || type;
  const g   = new Konva.Group({ x, y, draggable: true, id });

  let shape;
  if (type === 'ground') {
    // Ground — vertical line + 3 horizontal bars
    shape = new Konva.Line({
      points:[0,-22, 0,0, -18,0, 18,0, -12,8, 12,8, -6,16, 6,16],
      stroke: col.stroke, strokeWidth:2, lineCap:'round',
      tension:0, closed:false,
    });
    g.add(shape);
  } else if (type === 'ac' || type === 'dc') {
    // Circle symbol
    shape = new Konva.Circle({ radius:24, fill:col.fill, stroke:col.stroke, strokeWidth:2 });
    g.add(shape);
    if (type === 'ac') {
      g.add(new Konva.Line({
        points:[-14,0, -7,-10, 0,0, 7,10, 14,0],
        stroke:col.stroke, strokeWidth:2, tension:0.4,
      }));
    } else {
      g.add(new Konva.Line({ points:[-12,-5,12,-5], stroke:col.stroke, strokeWidth:3 }));
      g.add(new Konva.Line({ points:[-8,5,8,5],    stroke:col.stroke, strokeWidth:2 }));
    }
  } else if (type === 'terminal') {
    shape = new Konva.Rect({ x:-28, y:-14, width:56, height:28, rx:4, fill:col.fill, stroke:col.stroke, strokeWidth:2 });
    g.add(shape);
    g.add(new Konva.Circle({ x:-10, y:0, radius:6, fill:col.stroke }));
    g.add(new Konva.Circle({ x:10,  y:0, radius:6, fill:col.stroke }));
  } else {
    // Rectangle (device / psu)
    const w = type==='psu' ? 80 : 90, h = 48;
    shape = new Konva.Rect({ x:-w/2, y:-h/2, width:w, height:h, rx:6, fill:col.fill, stroke:col.stroke, strokeWidth:2 });
    g.add(shape);
    if (type==='psu') {
      g.add(new Konva.Text({ x:-w/2, y:-h/2, width:w, height:16, text:'PSU', fontSize:9, fontStyle:'bold', fill:col.stroke, align:'center', verticalAlign:'middle' }));
    }
  }

  // Label text
  const txt = new Konva.Text({
    text: lbl, fontSize:11, fontFamily:'system-ui,sans-serif',
    fill:col.text, fontStyle:'600',
    listening:false,
  });
  txt.offsetX(txt.width()/2);
  txt.y(type==='ground' ? 20 : type==='ac'||type==='dc' ? 28 : 28);
  txt.name('lbl');
  g.add(txt);

  // Anchor dot (center connection point)
  const anchor = new Konva.Circle({ radius:5, fill:col.stroke, opacity:0, name:'anchor' });
  g.add(anchor);

  // Events
  g.on('mouseenter', () => { if (mode==='wire') { anchor.opacity(0.8); layer.batchDraw(); } });
  g.on('mouseleave', () => { anchor.opacity(0); layer.batchDraw(); });
  g.on('click', onNodeClick);
  g.on('dblclick', () => editLabel(g));
  g.on('dragmove', () => { updateWires(id); });
  g.on('dragend',  snapshot);

  nodes[id] = g;
  layer.add(g);
  layer.batchDraw();
  return g;
}

// ── Edit label ───────────────────────────────────────────────────
function editLabel(g) {
  const pos  = stage.container().getBoundingClientRect();
  const ap   = g.absolutePosition();
  const txt  = g.findOne('.lbl');
  const cur  = txt ? txt.text() : '';
  const val  = prompt('Label:', cur);
  if (val === null) return;
  if (txt) { txt.text(val); txt.offsetX(txt.width()/2); }
  layer.batchDraw();
  snapshot();
}

// ── Wire drawing ─────────────────────────────────────────────────
function onNodeClick(e) {
  const g = e.currentTarget;
  if (mode === 'wire') {
    const ap = g.absolutePosition();
    if (!wireStart) {
      wireStart = { id: g.id(), x: ap.x, y: ap.y };
      tempLine = new Konva.Line({
        points:[ap.x,ap.y,ap.x,ap.y],
        stroke:'#1e293b', strokeWidth:2, dash:[6,4],
      });
      wireLayer.add(tempLine); wireLayer.batchDraw();
    } else {
      if (wireStart.id === g.id()) { wireStart=null; tempLine&&tempLine.destroy(); tempLine=null; wireLayer.batchDraw(); return; }
      addWire(wireStart.id, g.id());
      wireStart=null; tempLine&&tempLine.destroy(); tempLine=null;
      wireLayer.batchDraw();
      snapshot();
    }
  } else if (mode === 'delmode') {
    const id = g.id();
    // remove connected wires first
    Object.keys(wires).forEach(wid => {
      if (wires[wid].fromId===id || wires[wid].toId===id) {
        wires[wid].line.destroy(); delete wires[wid];
      }
    });
    g.destroy(); delete nodes[id];
    layer.batchDraw(); wireLayer.batchDraw();
    snapshot();
  }
}

stage.on('mousemove', e => {
  if (mode==='wire' && wireStart && tempLine) {
    const pos = stage.getPointerPosition();
    tempLine.points([wireStart.x, wireStart.y, pos.x, pos.y]);
    wireLayer.batchDraw();
  }
});

// ── Add wire ─────────────────────────────────────────────────────
function addWire(fromId, toId, wid, label) {
  wid = wid || uid();
  const f = nodes[fromId], t = nodes[toId];
  if (!f || !t) return;
  const fp = f.absolutePosition(), tp = t.absolutePosition();
  const line = new Konva.Line({
    points:[fp.x,fp.y,tp.x,tp.y],
    stroke:'#1e293b', strokeWidth:2.5, lineCap:'round',
    hitStrokeWidth:10,
  });
  if (label) {
    // label on wire (midpoint)
  }
  line.on('click', () => {
    if (mode==='delmode') { line.destroy(); delete wires[wid]; wireLayer.batchDraw(); snapshot(); }
  });
  wires[wid] = { line, fromId, toId };
  wireLayer.add(line);
  wireLayer.batchDraw();
}

function updateWires(nodeId) {
  Object.values(wires).forEach(w => {
    if (w.fromId===nodeId || w.toId===nodeId) {
      const f = nodes[w.fromId], t = nodes[w.toId];
      if (f && t) {
        const fp = f.absolutePosition(), tp = t.absolutePosition();
        w.line.points([fp.x,fp.y,tp.x,tp.y]);
      }
    }
  });
  wireLayer.batchDraw();
}

// ── Palette click ─────────────────────────────────────────────────
document.querySelectorAll('.pal-item[data-type]').forEach(el => {
  el.addEventListener('click', () => {
    const type = el.dataset.type;
    document.querySelectorAll('.pal-item').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
    if (type==='wire') {
      mode='wire';
      document.getElementById('canvas-wrap').classList.add('wire-mode');
      wireStart=null; if(tempLine){tempLine.destroy();tempLine=null;wireLayer.batchDraw();}
    } else if (type==='select') {
      mode='select';
      document.getElementById('canvas-wrap').classList.remove('wire-mode');
    } else if (type==='delmode') {
      mode='delmode';
      document.getElementById('canvas-wrap').classList.remove('wire-mode');
    } else {
      // place component at canvas center
      mode='select';
      document.getElementById('canvas-wrap').classList.remove('wire-mode');
      const g = drawSymbol(type, W/2 + Math.random()*40-20, H/2 + Math.random()*40-20);
      snapshot();
    }
  });
});

// ── Serialize / Deserialize ───────────────────────────────────────
function serialize() {
  const ns = Object.entries(nodes).map(([id,g]) => ({
    id, type:g.getAttr('data-type')||'device',
    x:g.x(), y:g.y(),
    label: (g.findOne('.lbl')||{}).text ? g.findOne('.lbl').text() : '',
  }));
  const ws = Object.entries(wires).map(([wid,w]) => ({
    id:wid, fromId:w.fromId, toId:w.toId,
  }));
  return { nodes:ns, wires:ws };
}

function deserialize(data) {
  if (!data) return;
  (data.nodes||[]).forEach(n => {
    const g = drawSymbol(n.type, n.x, n.y, n.label, n.id);
    g.setAttr('data-type', n.type);
  });
  (data.wires||[]).forEach(w => addWire(w.fromId, w.toId, w.id));
}

// Track type on group
const _orig = drawSymbol;
// patch: store type on group
(function(){
  const origDraw = drawSymbol;
  window._drawSymbolWithType = function(type,x,y,label,id){
    const g = origDraw(type,x,y,label,id);
    g.setAttr('data-type',type);
    return g;
  };
})();

// ── Undo / Redo ───────────────────────────────────────────────────
document.getElementById('btn-undo').addEventListener('click', () => {
  if (histIdx <= 0) return;
  histIdx--;
  restoreSnapshot(history[histIdx]);
});
document.getElementById('btn-redo').addEventListener('click', () => {
  if (histIdx >= history.length-1) return;
  histIdx++;
  restoreSnapshot(history[histIdx]);
});

function restoreSnapshot(s) {
  // clear
  Object.values(nodes).forEach(g=>g.destroy()); Object.keys(nodes).forEach(k=>delete nodes[k]);
  Object.values(wires).forEach(w=>w.line.destroy()); Object.keys(wires).forEach(k=>delete wires[k]);
  layer.batchDraw(); wireLayer.batchDraw();
  deserialize(JSON.parse(s));
}

// ── Clear ─────────────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', () => {
  if (!confirm('Hapus semua komponen?')) return;
  Object.values(nodes).forEach(g=>g.destroy()); Object.keys(nodes).forEach(k=>delete nodes[k]);
  Object.values(wires).forEach(w=>w.line.destroy()); Object.keys(wires).forEach(k=>delete wires[k]);
  layer.batchDraw(); wireLayer.batchDraw();
  snapshot();
});

// ── Save ──────────────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', async () => {
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Menyimpan...';
  try {
    const json   = JSON.stringify(serialize());
    const imgUrl = stage.toDataURL({ pixelRatio:2, mimeType:'image/png' });
    const fd = new FormData();
    fd.append('wiring_json', json);
    fd.append('wiring_img',  imgUrl);
    fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
    const res = await fetch(SAVE_URL, { method:'POST', body:fd });
    const data = await res.json();
    if (data.ok) toast('✓ Wiring diagram disimpan');
    else toast('Gagal menyimpan');
  } catch(e) {
    toast('Error: ' + e.message);
  } finally {
    btn.disabled=false; btn.innerHTML='<i class="bi bi-floppy me-1"></i>Simpan';
  }
});

// ── Keyboard delete ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.key==='Delete'||e.key==='Backspace') && e.target===document.body) {
    const sel = stage.findOne('.selected');
    if (sel) sel.destroy();
    layer.batchDraw();
  }
});

// ── Load existing ─────────────────────────────────────────────────
deserialize(EXISTING_JSON);
snapshot();

// ── Select tool default ───────────────────────────────────────────
document.getElementById('tool-select').click();
</script>
{% endblock %}
