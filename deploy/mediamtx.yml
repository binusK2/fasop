# ─────────────────────────────────────────────────────────────────────────
# MediaMTX — media server WebRTC (WHIP publish / WHEP playback) untuk fitur
# Live Streaming FASOP (app `streaming`). Proses TERPISAH dari Django/gunicorn
# — jalankan sebagai service sendiri (systemd), bukan bagian dari runserver.
#
# Install   : unduh binary rilis dari https://github.com/bluenviron/mediamtx
# Jalankan  : ./mediamtx /path/ke/deploy/mediamtx.yml
# Cek versi : nama-nama key di bawah mengikuti skema mediamtx.yml versi rilis
#             yang dipakai — cocokkan dengan mediamtx.yml default bawaan
#             binary yang diunduh sebelum deploy, karena key bisa berubah
#             antar versi.
#
# Alur akses (lihat streaming/models.py & streaming/views.py di kode Django):
#   - Teknisi publish video   -> path live-<stream_key>       (WHIP)
#   - Viewer  baca video      -> path live-<stream_key>       (WHEP)
#   - Pengawas (AM) publish   -> path live-<stream_key>-talk  (WHIP, audio only)
#   - Teknisi baca talkback   -> path live-<stream_key>-talk  (WHEP)
#   - ffmpeg (internal, loopback) -> path live-<stream_key>-rec (RTSP,
#     transcode VP8->H.264 supaya bisa direkam — lihat blok all_others di
#     bawah dan catatan panjang di bagian "paths:")
#   Semua permintaan publish/read divalidasi MediaMTX ke Django lewat
#   authHTTPAddress di bawah — Django yang jadi sumber kebenaran token
#   (kecuali ffmpeg internal di atas, diizinkan lewat cek loopback IP).
#
# Prasyarat tambahan: ffmpeg WAJIB terinstal di server ini
# (`sudo apt install -y ffmpeg`) — dipakai untuk transcode rekaman.
# ─────────────────────────────────────────────────────────────────────────

# ── WebRTC (WHIP/WHEP) ──────────────────────────────────────────────
# TLS: DUA opsi, pilih SATU saja.
#   A) MediaMTX yang pegang TLS langsung -> webrtcEncryption: true +
#      webrtcServerCert/webrtcServerKey (butuh cert sendiri buat MediaMTX).
#   B) (DIREKOMENDASIKAN kalau nginx+cert buat Django sudah ada) -> nginx
#      yang terima HTTPS lalu reverse-proxy ke MediaMTX di localhost:8889.
#      webrtcEncryption TETAP false di sini karena nginx yang urus TLS-nya.
#      Lihat deploy/nginx-mediamtx.conf.example.
webrtc: true
webrtcAddress: :8889
webrtcEncryption: false
webrtcAllowOrigins: ["https://GANTI-KE-DOMAIN-FASOP-PRODUKSI"]   # origin browser tempat FASOP dibuka (BUKAN domain MediaMTX-nya kalau pakai opsi B) — array, bukan string tunggal

# 1 port UDP tetap untuk semua koneksi media WebRTC — jauh lebih gampang
# dibuka sekali di firewall daripada range port UDP acak (default MediaMTX
# tanpa ini pakai port acak per koneksi).
webrtcLocalUDPAddress: :8189

# STUN/TURN — WAJIB isi TURN valid di production. HP teknisi di lapangan
# umumnya di belakang CGNAT operator seluler sehingga WebRTC sering gagal
# connect tanpa TURN relay. Pasang coturn terpisah, lalu isi kredensial yang
# SAMA di sini dan di WEBRTC_ICE_SERVERS pada .env Django.
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
  - url: turn:media.fasop.internal:3478
    username: fasop
    password: isi-password-turn-yang-sama-dengan-coturn-dan-env-django

# ── Auth eksternal — MediaMTX minta izin ke Django untuk tiap publish/read ──
authMethod: http
# key= harus sama persis dengan MEDIAMTX_AUTH_SECRET di .env Django
authHTTPAddress: http://127.0.0.1:8000/streaming/webhook/mediamtx-auth/?key=isi-MEDIAMTX_AUTH_SECRET-yang-sama-dengan-env-django
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof

# ── Path ─────────────────────────────────────────────────────────────
# Path dibuat otomatis saat publish pertama (nama path = stream_key acak
# dari Django) — tidak perlu didaftarkan satu per satu secara manual.
#
# CATATAN PENTING soal rekaman & kodek video:
# Video WebRTC dari browser (WHIP publish teknisi) selalu VP8 kalau tidak
# dipaksa — dan recorder fMP4 bawaan MediaMTX BELUM mengimplementasi VP8
# (sudah dicek langsung ke source-nya, termasuk branch main terbaru, bukan
# soal versi kurang baru — cari komentar "// TODO" di
# internal/recorder/format_fmp4.go kalau mau verifikasi ulang di rilis
# yang dipakai). Memaksa browser pakai kodek H.264 lewat
# setCodecPreferences() sudah pernah dicoba dan malah merusak WHEP live
# viewing (penonton konek tapi video tidak tampil) — jadi jangan diulangi.
#
# Solusinya: TRANSCODE di sisi server, bukan di browser. Path video mentah
# (live-<key>) sendiri TIDAK direkam (record: false) — begitu ada
# publisher, runOnReady di blok all_others menjalankan ffmpeg LOKAL yang
# menarik feed RTSP mentah dari MediaMTX sendiri (loopback, sama sekali
# tidak lewat WebRTC/browser sehingga tidak berisiko ke live viewing),
# transcode ke H.264, lalu republish ke path baru "<key>-rec" — HANYA path
# "-rec" itu yang direkam (video asli, bukan audio-only lagi). ffmpeg
# WAJIB terinstal di server (`sudo apt install -y ffmpeg`); prosesnya
# otomatis dihentikan (SIGINT) oleh MediaMTX begitu path aslinya berhenti
# live, tidak perlu cleanup manual. Beban CPU per sesi live cukup ringan
# (libx264 preset veryfast, 1 sesi live ~ jauh di bawah 1 core) — cukup
# untuk skala FASOP (maks 2-3 live bersamaan), tapi pantau CPU server kalau
# suatu saat jumlah live bersamaan naik jauh.
#
# authHTTPExclude TIDAK dipakai untuk mengizinkan ffmpeg internal ini —
# webhook Django (mediamtx_auth_webhook) sendiri yang mengizinkan koneksi
# loopback (127.0.0.1) khusus untuk path "-rec"/path video mentah dari sesi
# yang benar-benar sedang live, lihat streaming/views.py.
#
# Talkback (live-<key>-talk, cuma audio pengawas) sengaja TIDAK direkam.
# Retensi 7 hari ditangani di sisi Django lewat cron
# `manage.py purge_old_recordings` (bukan recordDeleteAfter MediaMTX) supaya
# konsisten dengan field LiveSession.recording_path — jangan aktifkan
# auto-delete di kedua sisi sekaligus, nanti dobel/rebutan hapus file yang
# sama.
paths:
  "~^live-.+-talk$":
    record: false

  # Path hasil transcode ffmpeg (lihat runOnReady di blok all_others) —
  # nama path ini TIDAK pernah dipakai browser manapun, murni internal.
  "~^live-.+-rec$":
    record: true
    recordPath: /var/lib/fasop-streaming/recordings/%path/%Y-%m-%d_%H-%M-%S-%f
    recordFormat: fmp4
    recordSegmentDuration: 24h   # sesi live jarang >24h; 1 segmen ≈ 1 rekaman per sesi
    recordDeleteAfter: 0s        # WAJIB 0s (disabled) — retensi ditangani Django (purge_old_recordings),
                                  # default MediaMTX 1d akan hapus duluan sebelum retensi 7 hari kita jalan

    # Panggil balik Django tiap segmen rekaman selesai ditulis, supaya
    # LiveSession.recording_path terisi dan halaman "Putar Rekaman" aktif.
    # key= harus sama persis dengan MEDIAMTX_AUTH_SECRET di .env Django.
    # $MTX_PATH & $MTX_SEGMENT_PATH disediakan MediaMTX saat hook ini jalan.
    runOnRecordSegmentComplete: >
      curl -s -X POST "http://127.0.0.1:8000/streaming/webhook/mediamtx-record/?key=isi-MEDIAMTX_AUTH_SECRET-yang-sama-dengan-env-django"
      -H "Content-Type: application/json"
      -d "{\"path\":\"$MTX_PATH\",\"segment_path\":\"$MTX_SEGMENT_PATH\"}"

  all_others:
    record: false

    # $MTX_PATH & $RTSP_PORT disediakan MediaMTX. Video mentah WHIP selalu
    # VP8 -> transcode ke H.264 supaya bisa direkam (lihat catatan panjang
    # di atas). -rtsp_transport tcp di kedua sisi supaya round-trip loopback
    # ini tidak butuh port UDP tambahan.
    runOnReady: >
      ffmpeg -nostdin -loglevel warning -rtsp_transport tcp
      -i rtsp://127.0.0.1:$RTSP_PORT/$MTX_PATH
      -c:v libx264 -preset veryfast -tune zerolatency -profile:v baseline -pix_fmt yuv420p
      -c:a aac
      -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:$RTSP_PORT/${MTX_PATH}-rec
    runOnReadyRestart: no
